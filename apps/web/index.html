<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e12" />
    <title>ClickKeep — group metronome</title>
    <script>
      // Apply theme before paint to prevent flash. Reads localStorage; falls back to system pref.
      (function () {
        try {
          var stored = localStorage.getItem('clickkeep:theme');
          var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-ink-50 dark:bg-ink-900 text-ink-900 dark:text-ink-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
