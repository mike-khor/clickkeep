name = "clickkeep-session"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

[[kv_namespaces]]
binding = "JOIN_CODES"
# Run `wrangler kv:namespace create JOIN_CODES` to create and paste the id here.
id = "PLACEHOLDER_PRODUCTION_KV_ID"
preview_id = "PLACEHOLDER_PREVIEW_KV_ID"

[observability]
enabled = true

# The dev worker binds to loopback (127.0.0.1) by default — safe for
# browser-on-Mac testing. Session ownership is implicit ("you opened it,
# you control it"), so an unauthenticated worker on the LAN would let any
# nearby device interfere with rehearsals. To test group mode from a
# phone on the same Wi-Fi, opt in explicitly with `pnpm worker:dev:lan`
# (which passes `--ip 0.0.0.0`). See apps/web/.env.example.
