<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-label="ClickKeep delivers the beat as sound, a visual flash, and a haptic vibration">
  <defs>
    <style>
      .card  { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .icon  { fill: #f97316; }
      .ring  { fill: none; stroke: #f97316; stroke-width: 2.5; }
      .title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               font-weight: 700; font-size: 17px; fill: #7c2d12; }
      .sub   { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               font-weight: 500; font-size: 12px; fill: #9a3412; }
    </style>
  </defs>

  <!-- Card 1: Sound -->
  <g transform="translate(20,20)">
    <rect class="card" width="220" height="140" rx="16"/>
    <!-- icon centered in upper region -->
    <g transform="translate(110,52)">
      <path class="icon" d="M-22,-12 L-10,-12 L4,-24 L4,12 L-10,0 L-22,0 Z"/>
      <path class="ring" d="M12,-16 Q22,-6 12,4"/>
      <path class="ring" d="M20,-22 Q34,-6 20,10"/>
    </g>
    <text class="title" text-anchor="middle" x="110" y="100">Sound</text>
    <text class="sub"   text-anchor="middle" x="110" y="120">Sample-accurate Web Audio</text>
  </g>

  <!-- Card 2: Visual -->
  <g transform="translate(250,20)">
    <rect class="card" width="220" height="140" rx="16"/>
    <g transform="translate(110,52)">
      <circle class="icon" r="16"/>
      <circle class="ring" r="24" opacity="0.75"/>
      <circle class="ring" r="32" opacity="0.4"/>
    </g>
    <text class="title" text-anchor="middle" x="110" y="100">Visual</text>
    <text class="sub"   text-anchor="middle" x="110" y="120">Full-screen flash on the beat</text>
  </g>

  <!-- Card 3: Haptic -->
  <g transform="translate(480,20)">
    <rect class="card" width="220" height="140" rx="16"/>
    <g transform="translate(110,52)" stroke-linecap="round">
      <!-- phone body -->
      <rect class="icon" x="-10" y="-22" width="20" height="44" rx="5"/>
      <!-- vibration marks -->
      <path class="ring" d="M-22,-12 L-16,-6"/>
      <path class="ring" d="M-22,0   L-16,0"/>
      <path class="ring" d="M-22,12  L-16,6"/>
      <path class="ring" d="M22,-12  L16,-6"/>
      <path class="ring" d="M22,0    L16,0"/>
      <path class="ring" d="M22,12   L16,6"/>
    </g>
    <text class="title" text-anchor="middle" x="110" y="100">Haptic</text>
    <text class="sub"   text-anchor="middle" x="110" y="120">Vibration on mobile + watch</text>
  </g>
</svg>
